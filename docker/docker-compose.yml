services:
  packrat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: packrat
    ports:
      - "50505:50505"
    environment:
      - PORT=50505
      - DB_PATH=/app/data/db/packrat.db
      - MEDIA_ROOT=/app/data/media
      - MAX_CONCURRENT_DOWNLOADS=2
    volumes:
      - ./data/media:/app/data/media
      - ./data/db:/app/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:50505/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Uncomment to cap resource usage (Engineering Requirements: Resource Limits):
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 1G
